# ============================ 5 PASOS INICIALES ============================
1. **Planificación**: Define objetivos, funcionalidades y diseño del proyecto.
2. **Configuración**: Configura Git, estructura de carpetas e instala dependencias. (Revisar : NPM Scripts)
3. **Desarrollo**: Desarrolla features siguiendo el flujo (feature -> dev -> main).
4. **Pruebas**: Pruebas unitarias y revisión de código mediante pull requests.
5. **Deploy**: Despliega y recopila feedback de usuarios.
